---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other
workflows:
  primary:
    description: Build APK with Expo CLI
    steps:
    - git-clone@8: {}
    - script@1:
        title: Setup Node.js
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            # Update npm
            npm install -g npm@latest
    - script@1:
        title: Install Dependencies
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            npm install --legacy-peer-deps
    - script@1:
        title: Install Expo CLI
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            npm install -g expo-cli
    - script@1:
        title: Build Android APK (Local Build)
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            # Build with expo
            expo prebuild --clean --platform android || true
            # Build APK using gradle
            cd android && ./gradlew assembleRelease || echo \"Gradle build attempt completed\"
    - script@1:
        title: Find and Copy APK to Artifacts\n
        inputs:
        - content: |-\n
            #!/bin/bash
            set -ex
            # Find APK files
            find \"$BITRISE_SOURCE_DIR\" -name \"*.apk\" -type f 2>/dev/null | while read apk; do
              echo \"Found APK: $apk\"
              cp \"$apk\" \"$BITRISE_DEPLOY_DIR/\"
            done
            # List artifacts
            ls -lah \"$BITRISE_DEPLOY_DIR/\" || echo \"No artifacts found yet\"
    - deploy-to-bitrise-io@2: {}