---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: expo
workflows:
  primary:
    description: Build Android APK with EAS Build
    steps:
    - git-clone@8: {}
    - script@1:
        title: Setup Node.js & NPM
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            node --version
            npm --version
            npm install -g npm@latest
    - script@1:
        title: Install Dependencies
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            npm install
    - script@1:
        title: Install EAS CLI
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            npm install -g eas-cli
    - script@1:
        title: Build APK with EAS
        inputs:
        - content: |-
            #!/bin/bash
            set -ex
            # Build with EAS
            eas build --platform android --profile preview --non-interactive --output=$BITRISE_DEPLOY_DIR/app.apk
    - deploy-to-bitrise-io@2: {}
